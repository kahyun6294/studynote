<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>통합고용세액공제 계산기</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{--indigo:#6366F1;--indigo-d:#4f46e5;--indigo-light:#EEF2FF;--green:#10B981;--red:#ef4444;--gray-50:#f8fafc;--gray-100:#f1f5f9;--gray-200:#e2e8f0;--gray-500:#64748b;--gray-700:#334155;--gray-900:#0f172a;--white:#fff;--shadow:0 4px 20px rgba(0,0,0,0.08);}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Noto Sans KR',sans-serif;background:#f0f2f5;min-height:100vh;padding:32px 20px;color:var(--gray-900);}
.page-header{max-width:1200px;margin:0 auto 28px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;}
.back-btn{font-size:12px;color:var(--gray-500);text-decoration:none;}.back-btn:hover{color:var(--indigo);}
.page-title{font-size:22px;font-weight:900;}.page-sub{font-size:12px;color:var(--gray-500);margin-left:auto;}
.settings-row{max-width:1200px;margin:0 auto 16px;display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;}
.card{background:var(--white);border-radius:16px;padding:20px;box-shadow:var(--shadow);}
.card-title{font-size:11px;font-weight:900;color:#94a3b8;letter-spacing:.05em;margin-bottom:14px;text-transform:uppercase;}
.field{margin-bottom:10px;}.field:last-child{margin-bottom:0;}
.field label{display:block;font-size:11px;font-weight:700;color:var(--gray-500);margin-bottom:5px;}
.field select,.field input[type=text]{width:100%;border:1.5px solid var(--gray-200);border-radius:10px;padding:8px 12px;font-size:12px;font-family:inherit;outline:none;background:var(--white);}
.field select:focus,.field input[type=text]:focus{border-color:var(--indigo);}
.result-row{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid var(--gray-50);}
.result-row:last-child{border-bottom:none;}
.result-label{font-size:10px;color:var(--gray-500);}.result-value{font-size:11px;font-weight:700;}
.note-box{background:#fffbeb;border-radius:8px;padding:8px 10px;font-size:9px;color:#92400e;line-height:1.6;margin-top:8px;}
.year-card{background:var(--white);border-radius:16px;padding:20px;box-shadow:var(--shadow);}
.year-card-title{font-size:12px;font-weight:900;color:var(--indigo);margin-bottom:14px;display:flex;align-items:center;gap:8px;}
.year-badge{background:var(--indigo-light);color:var(--indigo);border-radius:6px;padding:2px 8px;font-size:11px;font-weight:900;}
.year-badge-gray{background:var(--gray-100);color:var(--gray-500);}
.worker-table{width:100%;border-collapse:collapse;}
.worker-table th{font-size:10px;font-weight:700;color:#94a3b8;padding:4px 8px;text-align:center;border-bottom:1px solid var(--gray-200);}
.worker-table th:first-child{text-align:left;}
.worker-table td{padding:5px 8px;font-size:12px;border-bottom:1px solid var(--gray-50);}
.worker-table td:first-child{font-weight:700;color:var(--gray-500);font-size:11px;}
.worker-table td.auto-cell{background:var(--gray-50);}
.worker-table input{width:80px;border:1.5px solid var(--gray-200);border-radius:8px;padding:5px 8px;font-size:12px;font-family:inherit;text-align:center;outline:none;}
.worker-table input:focus{border-color:var(--indigo);}
.worker-table input.auto-inp{background:var(--indigo-light);border-color:#c7d2fe;color:var(--indigo-d);font-weight:700;cursor:default;}
.auto{background:var(--gray-50);color:var(--gray-500);font-size:12px;text-align:center;border-radius:8px;padding:5px 10px;display:inline-block;min-width:70px;}
.auto.pos{color:var(--green);font-weight:700;}.auto.neg{color:var(--red);font-weight:700;}
.extra-section{background:var(--gray-50);border-radius:10px;padding:12px 14px;margin-top:12px;}
.extra-title{font-size:10px;font-weight:900;color:var(--indigo);margin-bottom:10px;}
.extra-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;}.extra-row:last-child{margin-bottom:0;}
.extra-label{font-size:11px;color:var(--gray-500);font-weight:700;min-width:100px;}
.extra-input{width:70px;border:1.5px solid var(--gray-200);border-radius:8px;padding:5px 8px;font-size:12px;font-family:inherit;text-align:center;outline:none;}
.extra-input:focus{border-color:var(--indigo);}
.extra-sub{font-size:10px;color:#94a3b8;}
.jing-section{background:#fff5f5;border-radius:10px;padding:12px 14px;margin-top:8px;}
.jing-title{font-size:10px;font-weight:900;color:var(--red);margin-bottom:10px;}
.result-card{background:var(--white);border-radius:16px;padding:20px;box-shadow:var(--shadow);}
.result-card-title{font-size:11px;font-weight:900;color:#94a3b8;margin-bottom:12px;letter-spacing:.05em;}
.res-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--gray-50);}
.res-row:last-child{border-bottom:none;}
.res-label{font-size:11px;color:var(--gray-500);}.res-value{font-size:12px;font-weight:700;}
.res-divider{border:none;border-top:1.5px solid var(--gray-100);margin:8px 0;}
.jing-card{border-left:4px solid var(--red);}
.summary-card{max-width:1200px;margin:0 auto 16px;background:var(--white);border-radius:16px;padding:20px;box-shadow:var(--shadow);}
.summary-table{width:100%;border-collapse:collapse;font-size:12px;}
.summary-table th{background:var(--gray-50);color:#94a3b8;font-weight:700;font-size:10px;padding:8px 12px;text-align:center;border-bottom:1.5px solid var(--gray-200);}
.summary-table th:first-child{text-align:left;}
.summary-table td{padding:8px 12px;border-bottom:1px solid var(--gray-50);text-align:center;}
.summary-table td:first-child{text-align:left;font-weight:700;color:var(--gray-500);}
.summary-table tr.total-row td{font-weight:900;background:var(--indigo-light);color:var(--indigo);}
.tag{display:inline-block;border-radius:5px;padding:2px 7px;font-size:10px;font-weight:700;}
.tag-green{background:#d1fae5;color:#065f46;}.tag-red{background:#fee2e2;color:#991b1b;}.tag-gray{background:var(--gray-100);color:var(--gray-500);}
.highlight-box{background:var(--indigo-light);border-radius:10px;padding:12px;margin-top:10px;display:flex;justify-content:space-between;align-items:center;}
.action-row{max-width:1200px;margin:0 auto 24px;display:flex;gap:10px;justify-content:flex-end;}
.btn{padding:9px 18px;border:none;border-radius:10px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;}
.btn-primary{background:var(--indigo);color:var(--white);}.btn-primary:hover{background:var(--indigo-d);}
.btn-secondary{background:var(--gray-100);color:var(--gray-500);}.btn-secondary:hover{background:var(--gray-200);}
/* ===== 인쇄/PDF ===== */
.print-bar{max-width:1200px;margin:0 auto 16px;display:flex;justify-content:flex-end;}
.print-btn{padding:10px 22px;background:var(--indigo);color:#fff;border:none;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;box-shadow:0 2px 8px rgba(99,102,241,0.3);}
.print-btn:hover{background:var(--indigo-d);}
.print-hd{display:none;}
@media print{
  body{background:#fff!important;padding:8px 14px!important;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  .back-btn,.action-row,.print-bar{display:none!important;}
  .page-header{margin-bottom:8px;}
  .page-title{font-size:17px;}.page-sub{font-size:10px;}
  .settings-row{gap:8px;}
  .card{box-shadow:none!important;border:1px solid #ddd;border-radius:6px;padding:12px;break-inside:avoid;}
  .card-title{font-size:10px;margin-bottom:8px;}
  .year-card{box-shadow:none!important;border:1px solid #ddd;border-radius:6px;padding:12px;break-inside:avoid;}
  .summary-card{box-shadow:none!important;border:1px solid #ddd;border-radius:6px;padding:12px;}
  .result-card{box-shadow:none!important;border:1px solid #ddd;border-radius:6px;padding:12px;break-inside:avoid;}
  .summary-table{font-size:10px;}.summary-table th{font-size:9px;padding:5px 8px;}.summary-table td{padding:5px 8px;}
  .worker-table input{width:60px;font-size:10px;padding:3px 5px;}
  .extra-input{width:55px;font-size:10px;}
  .extra-label{font-size:10px;min-width:85px;}
  .print-hd{display:block!important;border-bottom:2px solid var(--indigo);padding-bottom:6px;margin-bottom:12px;}
  .print-hd-title{font-size:14px;font-weight:900;color:#1a1a2e;}
  .print-hd-info{display:flex;gap:14px;margin-top:3px;font-size:10px;color:#64748b;align-items:center;}
  .print-hd-badge{background:var(--indigo-light);color:var(--indigo);border-radius:4px;padding:1px 6px;font-size:9px;font-weight:700;}
  .print-company{font-size:11px;font-weight:700;color:#1a1a2e;}
}
</style>
</head>
<body>
<div class="page-header">
  <a class="back-btn" href="tax-main.html">&#8592; 메인으로</a>
  <div class="page-title">&#128100; 통합고용세액공제 계산기</div>
  <div class="page-sub">조특법 §29의8 | 기본공제 + 추가공제 + 추징 (참고용)</div>
</div>
<!-- 인쇄용 헤더 -->
<div class="print-hd" id="print-hd">
  <div style="display:flex;justify-content:space-between;align-items:flex-end;">
    <div>
      <div class="print-hd-title">&#128100; 통합고용세액공제 계산 내역</div>
      <div class="print-hd-info">
        <span id="ph-date"></span>
        <span class="print-hd-badge">통합고용세액공제</span>
        <span class="print-company" id="ph-company"></span>
        <span style="color:#aaa;">| 참고용 추정 계산입니다</span>
      </div>
    </div>
  </div>
</div>
<!-- 인쇄 버튼 -->
<div class="print-bar"><button class="print-btn" onclick="doPrint()">&#128424;&#65039; PDF 저장 / 인쇄</button></div>
<div class="settings-row">
  <div class="card">
    <div class="card-title">&#9881;&#65039; 기본 설정</div>
    <div class="field"><label>기업구분</label><select id="corp-type" onchange="recalc()"><option value="sme">중소기업</option><option value="mid">중견기업</option><option value="big">대기업</option></select></div>
    <div class="field" id="region-wrap"><label>사업장 소재지</label><select id="region" onchange="recalc()"><option value="metro">수도권 내</option><option value="local">수도권 밖</option></select></div>
    <div class="field"><label>최초 공제 귀속연도</label><select id="base-year" onchange="buildYears()"><option value="2023">2023년</option><option value="2024">2024년</option><option value="2025" selected>2025년</option></select></div>
  </div>
  <div class="card">
    <div class="card-title">&#128203; 1인당 공제액</div>
    <div class="result-row"><span class="result-label">청년등 기본공제</span><span class="result-value" id="info-youth">-</span></div>
    <div class="result-row"><span class="result-label">청년외 기본공제</span><span class="result-value" id="info-general">-</span></div>
    <div class="result-row"><span class="result-label">정규직 전환 (추가)</span><span class="result-value" id="info-convert">-</span></div>
    <div class="result-row"><span class="result-label">육아휴직 복귀 (추가)</span><span class="result-value" id="info-parental">-</span></div>
    <div class="note-box">청년등 = 청년(15~34세)·장애인·60세이상·경력단절여성<br>중견기업 5명·대기업 10명 초과분부터 공제 (2026년~)</div>
  </div>
  <div class="card">
    <div class="card-title">&#128221; 사업장명 / 메모</div>
    <div class="field"><label>사업장명</label><input type="text" id="company-name" placeholder="(선택입력)"/></div>
    <div class="field"><label>메모</label><textarea id="memo" style="width:100%;border:1.5px solid var(--gray-200);border-radius:10px;padding:8px;font-size:12px;font-family:inherit;outline:none;resize:vertical;min-height:52px;" placeholder="비고사항..."></textarea></div>
  </div>
</div>
<div id="years-container"></div>
<div class="summary-card">
  <div class="card-title">&#128202; 연도별 공제·추징 요약</div>
  <div id="summary-table-wrap"></div>
  <div id="total-box" style="margin-top:12px;"></div>
</div>
<div id="detail-results"></div>
<div class="action-row">
  <button class="btn btn-secondary" onclick="resetAll()">초기화</button>
</div>
<script>
var RATES={sme:{metro:{youth:14500000,general:8500000},local:{youth:15500000,general:9500000},convert:13000000,parental:13000000},mid:{metro:{youth:8000000,general:4500000},local:{youth:8000000,general:4500000},convert:9000000,parental:9000000},big:{metro:{youth:4000000,general:0},local:{youth:4000000,general:0},convert:0,parental:0}};
var MAX_YEARS={sme:3,mid:3,big:2};
function getRates(){var c=val('corp-type'),r=val('region'),rv=RATES[c][r];return{youth:rv.youth,general:rv.general,convert:RATES[c].convert,parental:RATES[c].parental};}
function fmt(n){return Math.round(n).toLocaleString('ko-KR');}
function fmtW(n){return fmt(n)+'원';}
function val(id){var el=document.getElementById(id);return el?el.value:'';}
function numVal(id){var el=document.getElementById(id);if(!el)return 0;return parseFloat((el.value||'').replace(/,/g,''))||0;}
function setText(id,t){var el=document.getElementById(id);if(el)el.textContent=t;}
function setHtml(id,h){var el=document.getElementById(id);if(el)el.innerHTML=h;}
function updateRateInfo(){var r=getRates();function lbl(v){return v?fmt(v/10000)+'만원':'해당없음';}setText('info-youth',lbl(r.youth));setText('info-general',lbl(r.general));setText('info-convert',lbl(r.convert));setText('info-parental',lbl(r.parental));document.getElementById('region-wrap').style.display=val('corp-type')==='sme'?'':'none';}
function buildYears(){var baseYear=parseInt(val('base-year')),c=val('corp-type'),maxY=MAX_YEARS[c],container=document.getElementById('years-container');container.innerHTML='';var wrap=document.createElement('div');wrap.style.cssText='max-width:1200px;margin:0 auto 16px;';wrap.innerHTML='<div style="font-size:13px;font-weight:900;color:var(--gray-700);margin-bottom:10px;">&#128229; 연도별 상시근로자 입력</div>';var grid=document.createElement('div');grid.style.cssText='display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:12px;';
for(var offset=0;offset<=maxY;offset++){var yr=baseYear-1+offset,isBase=(offset===0),card=document.createElement('div');card.className='year-card';var badge=isBase?'<span class="year-badge year-badge-gray">기준(전년)</span>':'<span class="year-badge">'+offset+'차 공제</span>';var h='<div class="year-card-title">'+badge+'<span style="font-size:13px;font-weight:900;color:'+(isBase?'#64748b':'var(--indigo)')+';">'+yr+'년</span></div><table class="worker-table"><thead><tr><th>구분</th><th>인원수(명)</th><th>전년비 증감</th></tr></thead><tbody><tr><td>청년등</td><td><input type="text" id="youth-'+yr+'" placeholder="0" oninput="onWorkerInput(this,'+yr+')" onfocus="this.select()"/></td><td><span id="dy-'+yr+'" class="auto">-</span></td></tr><tr><td>청년외</td><td><input type="text" id="general-'+yr+'" placeholder="0" oninput="onWorkerInput(this,'+yr+')" onfocus="this.select()"/></td><td><span id="dg-'+yr+'" class="auto">-</span></td></tr><tr><td>전체 합계</td><td class="auto-cell"><input type="text" id="total-'+yr+'" class="auto-inp" readonly placeholder="자동"/></td><td><span id="dt-'+yr+'" class="auto">-</span></td></tr></tbody></table>';if(!isBase){h+='<div class="extra-section"><div class="extra-title">② 추가공제</div><div class="extra-row"><span class="extra-label">정규직 전환</span><input type="text" class="extra-input" id="convert-'+yr+'" placeholder="0" oninput="recalc()" onfocus="this.select()"/><span class="extra-sub">명</span></div><div class="extra-row"><span class="extra-label">육아휴직 복귀</span><input type="text" class="extra-input" id="parental-'+yr+'" placeholder="0" oninput="recalc()" onfocus="this.select()"/><span class="extra-sub">명</span></div></div><div class="jing-section"><div class="jing-title">&#9888;&#65039; 추징 (해당시만)</div><div class="extra-row"><span class="extra-label">정규직 2년내 퇴사</span><input type="text" class="extra-input" id="exit-convert-'+yr+'" placeholder="0" oninput="recalc()" onfocus="this.select()"/><span class="extra-sub">명</span></div><div class="extra-row"><span class="extra-label">육아휴직 2년내 퇴사</span><input type="text" class="extra-input" id="exit-parental-'+yr+'" placeholder="0" oninput="recalc()" onfocus="this.select()"/><span class="extra-sub">명</span></div></div>';}card.innerHTML=h;grid.appendChild(card);}wrap.appendChild(grid);container.appendChild(wrap);recalc();}
function onWorkerInput(el,yr){el.value=el.value.replace(/[^0-9.]/g,'');updateTotals();updateDiffs();recalc();}
function getW(yr){var y=numVal('youth-'+yr),g=numVal('general-'+yr);return{youth:y,general:g,total:y+g};}
function updateTotals(){var baseYear=parseInt(val('base-year')),c=val('corp-type'),maxY=MAX_YEARS[c];for(var offset=0;offset<=maxY;offset++){var yr=baseYear-1+offset,w=getW(yr),el=document.getElementById('total-'+yr);if(el)el.value=(w.youth||w.general)?w.total.toFixed(2):'';}}
function updateDiffs(){var baseYear=parseInt(val('base-year')),c=val('corp-type'),maxY=MAX_YEARS[c];for(var offset=1;offset<=maxY;offset++){var yr=baseYear-1+offset,pYr=yr-1,cur=getW(yr),prev=getW(pYr);if(!document.getElementById('youth-'+yr))continue;var dt=cur.total-prev.total,dy=cur.youth-prev.youth,dg=cur.general-prev.general;function setD(id,v){var el=document.getElementById(id);if(el){el.textContent=(v>=0?'+':'')+v.toFixed(2);el.className='auto'+(v>0?' pos':v<0?' neg':'');}}setD('dt-'+yr,dt);setD('dy-'+yr,dy);setD('dg-'+yr,dg);}}
function calcYear(offset,baseYear,rates){var yr=baseYear-1+offset,pYr=yr-1;if(!document.getElementById('youth-'+yr))return null;var cur=getW(yr),prev=getW(pYr),bW=getW(baseYear),bWp=getW(baseYear-1);var dT=cur.total-prev.total,dY=cur.youth-prev.youth,dG=cur.general-prev.general;var tInc=Math.max(0,dT),yInc=Math.min(Math.max(0,dY),tInc),gInc=Math.min(Math.max(0,dG),tInc-yInc);var dY2=yInc*rates.youth,dG2=gInc*rates.general;var conv=numVal('convert-'+yr)||0,par=numVal('parental-'+yr)||0;var dConv=conv*rates.convert,dPar=par*rates.parental,dTotal=dY2+dG2+dConv+dPar;var xConv=numVal('exit-convert-'+yr)||0,xPar=numVal('exit-parental-'+yr)||0;var jConv=xConv*rates.convert,jPar=xPar*rates.parental,jEmp=0;if(offset>=2){var b0dT=bW.total-bWp.total,b0dY=bW.youth-bWp.youth;var cvT=cur.total-bWp.total,cvY=cur.youth-bWp.youth;var decT=Math.max(0,-cvT),decY=Math.max(0,-cvY);if(decT>0||decY>0){var b0D=Math.max(0,b0dY)*rates.youth+Math.max(0,b0dT-Math.max(0,b0dY))*rates.general;var j=calcJing(decY,decT,b0dY,rates);if(offset===2)jEmp=Math.min(j,b0D);else if(offset===3)jEmp=Math.min(j*2,b0D*2);}}var jTotal=jConv+jPar+jEmp;return{yr,offset,dT,dY,dG,tInc,yInc,gInc,dY2,dG2,dConv,dPar,dTotal,conv,par,xConv,xPar,jConv,jPar,jEmp,jTotal};}
function calcJing(dY,dT,b0dY,rates){if(dY>=dT&&dT>0)return Math.max(0,(Math.min(Math.max(0,b0dY),dY)-dT)*(rates.youth-rates.general))+dT*rates.youth;return Math.min(dY,dT)*rates.youth+Math.min(Math.max(0,dT-dY),dT)*rates.general;}
function recalc(){updateRateInfo();updateTotals();updateDiffs();var baseYear=parseInt(val('base-year')),c=val('corp-type'),maxY=MAX_YEARS[c],rates=getRates(),results=[];for(var offset=1;offset<=maxY;offset++){var r=calcYear(offset,baseYear,rates);if(r)results.push(r);}renderSummary(results);renderDetails(results,rates);}
function renderSummary(results){if(!results.length){setHtml('summary-table-wrap','');setHtml('total-box','');return;}var tD=0,tJ=0,rows=results.map(function(r){tD+=r.dTotal;tJ+=r.jTotal;var net=r.dTotal-r.jTotal,tag=r.jTotal>0?'<span class="tag tag-red">추징있음</span>':(r.dTotal>0?'<span class="tag tag-green">공제</span>':'<span class="tag tag-gray">-</span>');return'<tr><td>'+r.yr+'년 ('+r.offset+'차)</td><td>'+(r.dT>=0?'<span style="color:var(--green)">+':'<span style="color:var(--red)">')+r.dT.toFixed(2)+'명</span></td><td>'+(r.dY>=0?'<span style="color:var(--green)">+':'<span style="color:var(--red)">')+r.dY.toFixed(2)+'</span>/'+r.dG.toFixed(2)+'</td><td>'+(r.dTotal>0?fmt(r.dTotal):'-')+'</td><td>'+(r.jTotal>0?'<span style="color:var(--red)">'+fmt(r.jTotal)+'</span>':'-')+'</td><td style="font-weight:900;color:'+(net>=0?'var(--indigo)':'var(--red)')+';">'+(net!==0?fmt(Math.abs(net))+(net<0?' (납부)':''):'-')+'</td><td>'+tag+'</td></tr>';});var net=tD-tJ;setHtml('summary-table-wrap','<table class="summary-table"><thead><tr><th>귀속연도</th><th>전체증감</th><th>청년등/청년외</th><th>공제액</th><th>추징액</th><th>실질공제</th><th>상태</th></tr></thead><tbody>'+rows.join('')+'<tr class="total-row"><td>합 계</td><td></td><td></td><td>'+fmt(tD)+'</td><td>'+(tJ>0?'<span style="color:var(--red)">'+fmt(tJ)+'</span>':'-')+'</td><td>'+fmt(net)+'</td><td></td></tr></tbody></table>');setHtml('total-box','<div class="highlight-box"><span style="font-size:12px;font-weight:700;color:'+(net>=0?'var(--indigo)':'var(--red)')+';">&#128202; 총 실질 세액공제 (공제 - 추징)</span><span style="font-size:18px;font-weight:900;color:'+(net>=0?'var(--indigo)':'var(--red)')+';">'+fmtW(Math.abs(net))+(net<0?' 납부':'')+'</span></div>');}
function renderDetails(results,rates){var container=document.getElementById('detail-results');if(!results.length){container.innerHTML='';return;}var html='<div style="max-width:1200px;margin:0 auto 16px;"><div style="font-size:13px;font-weight:900;color:var(--gray-700);margin-bottom:12px;">&#128203; 연도별 상세 계산</div><div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:12px;">';results.forEach(function(r){var hasJ=r.jTotal>0;html+='<div class="result-card'+(hasJ?' jing-card':'')+'"><div class="result-card-title">'+r.yr+'년 귀속 ('+r.offset+'차'+(hasJ?' · 추징있음':'')+')</div><div style="font-size:10px;font-weight:900;color:var(--indigo);margin-bottom:6px;">① 기본공제</div><div class="res-row"><span class="res-label">청년등 +'+r.yInc.toFixed(2)+'명 × '+fmt(rates.youth/10000)+'만원</span><span class="res-value">'+fmtW(r.dY2)+'</span></div><div class="res-row"><span class="res-label">청년외 +'+r.gInc.toFixed(2)+'명 × '+fmt(rates.general/10000)+'만원</span><span class="res-value">'+fmtW(r.dG2)+'</span></div>';if(r.conv>0||r.par>0){html+='<hr class="res-divider"><div style="font-size:10px;font-weight:900;color:var(--green);margin-bottom:6px;">② 추가공제</div>';if(r.conv>0)html+='<div class="res-row"><span class="res-label">정규직 전환 '+r.conv+'명 × '+fmt(rates.convert/10000)+'만원</span><span class="res-value" style="color:var(--green);">'+fmtW(r.dConv)+'</span></div>';if(r.par>0)html+='<div class="res-row"><span class="res-label">육아휴직 복귀 '+r.par+'명 × '+fmt(rates.parental/10000)+'만원</span><span class="res-value" style="color:var(--green);">'+fmtW(r.dPar)+'</span></div>';}html+='<hr class="res-divider"><div class="res-row"><span class="res-label" style="font-weight:900;">공제 합계</span><span class="res-value" style="color:var(--indigo);font-size:14px;">'+fmtW(r.dTotal)+'</span></div>';if(hasJ){html+='<hr class="res-divider"><div style="font-size:10px;font-weight:900;color:var(--red);margin-bottom:6px;">&#9888;&#65039; 추징</div>';if(r.jConv>0)html+='<div class="res-row"><span class="res-label">정규직 퇴사 '+r.xConv+'명</span><span class="res-value" style="color:var(--red);">'+fmtW(r.jConv)+'</span></div>';if(r.jPar>0)html+='<div class="res-row"><span class="res-label">육아휴직 퇴사 '+r.xPar+'명</span><span class="res-value" style="color:var(--red);">'+fmtW(r.jPar)+'</span></div>';if(r.jEmp>0)html+='<div class="res-row"><span class="res-label">통합고용 인원감소 추징</span><span class="res-value" style="color:var(--red);">'+fmtW(r.jEmp)+'</span></div>';html+='<div class="res-row"><span class="res-label" style="font-weight:900;">추징 합계</span><span class="res-value" style="color:var(--red);font-size:14px;">'+fmtW(r.jTotal)+'</span></div>';}var net=r.dTotal-r.jTotal;html+='<div style="background:'+(net>=0?'var(--indigo-light)':'#fff5f5')+';border-radius:10px;padding:10px 12px;margin-top:10px;display:flex;justify-content:space-between;align-items:center;"><span style="font-size:11px;font-weight:700;color:'+(net>=0?'var(--indigo)':'var(--red)')+';">실질 공제액</span><span style="font-size:16px;font-weight:900;color:'+(net>=0?'var(--indigo)':'var(--red)')+';">'+fmtW(Math.abs(net))+(net<0?' <small>(추징납부)</small>':'')+'</span></div></div>';});html+='</div></div>';container.innerHTML=html;}
function resetAll(){document.querySelectorAll('input[type=text]').forEach(function(el){if(el.id!=='company-name')el.value='';});document.getElementById('memo').value='';recalc();}
function doPrint(){var d=new Date();var el=document.getElementById('ph-date');if(el)el.textContent='출력일: '+d.getFullYear()+'.'+(d.getMonth()+1)+'.'+d.getDate();var cn=document.getElementById('ph-company');if(cn){var nm=document.getElementById('company-name');cn.textContent=nm&&nm.value?'| '+nm.value:'';}setTimeout(function(){window.print();},80);}
buildYears();
</script>

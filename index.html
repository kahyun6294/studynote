<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>세무 스터디 노트</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Noto Sans KR',sans-serif; background:#f0f2f5; min-height:100vh; padding:40px 20px; }
.header { text-align:center; margin-bottom:40px; }
.header h1 { font-size:28px; font-weight:900; color:#1a1a2e; margin-bottom:8px; }
.header p { font-size:14px; color:#888; }
.grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:20px; max-width:900px; margin:0 auto; }
.card { background:#fff; border-radius:16px; padding:24px; box-shadow:0 4px 20px rgba(0,0,0,0.08); transition:transform 0.2s; position:relative; }
.card:hover { transform:translateY(-4px); }
.card-link { text-decoration:none; display:block; }
.card-icon { font-size:32px; margin-bottom:12px; }
.card-tag { display:inline-block; font-size:10px; font-weight:700; padding:2px 8px; border-radius:20px; margin-bottom:8px; }
.card-title { font-size:16px; font-weight:900; color:#1a1a2e; margin-bottom:6px; }
.card-desc { font-size:12px; color:#888; line-height:1.6; margin-bottom:14px; }
.tag-vat { background:#FFF7ED; color:#F97316; }
.card-vat { border-top:3px solid #F97316; }
.memo-area { border-top:1px solid #f0f0f0; padding-top:10px; margin-top:4px; }
.memo-label { font-size:10px; font-weight:900; color:#94a3b8; margin-bottom:6px; }
.memo-chips { display:flex; flex-direction:column; gap:4px; margin-bottom:8px; min-height:20px; }
.memo-chip { display:flex; align-items:center; gap:6px; font-size:11px; }
.memo-chip-date { color:#bbb; white-space:nowrap; flex-shrink:0; }
.memo-chip-name { font-weight:700; background:#FFF7ED; color:#F97316; border-radius:20px; padding:2px 10px; }
.memo-chip-empty { font-size:11px; color:#ddd; }
.memo-input-row { display:flex; gap:6px; }
.memo-input { flex:1; border:1px solid #e5e7eb; border-radius:8px; padding:6px 10px; font-size:11px; font-family:inherit; outline:none; }
.memo-input:focus { border-color:#F97316; }
.memo-btn { background:#F97316; color:#fff; border:none; border-radius:8px; padding:6px 10px; font-size:11px; font-weight:700; cursor:pointer; }
.memo-btn:hover { background:#ea6c0a; }
</style>
</head>
<body>
<div class="header">
  <h1>📚 세무 스터디 노트</h1>
  <p>클릭하면 해당 자료로 이동해요</p>
</div>
<div class="grid">
  <div class="card card-vat">
    <a class="card-link" href="refund-process.html">
      <div class="card-icon">🔄</div>
      <div class="card-tag tag-vat">부가세</div>
      <div class="card-title">환불 프로세스</div>
      <div class="card-desc">부품 판매 후 환불 처리 흐름<br>위약금 · 수정세금계산서 처리 방법</div>
    </a>
    <div class="memo-area">
      <div class="memo-label">거래처</div>
      <div class="memo-chips" id="chips-refund-process"></div>
      <div class="memo-input-row">
        <input class="memo-input" id="inp-refund-process" placeholder="거래처 입력..." />
        <button class="memo-btn" id="btn-refund-process">추가</button>
      </div>
    </div>
  </div>
</div>

<script>
var KEY = 'studynote-memos';

function loadData() { try { return JSON.parse(localStorage.getItem(KEY) || '{}'); } catch(e) { return {}; } }
function saveData(d) { localStorage.setItem(KEY, JSON.stringify(d)); }

function fmtShort(iso) {
  var d = new Date(iso);
  return (d.getMonth()+1) + '/' + d.getDate();
}
function escHtml(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function renderChips(cardId) {
  var list = (loadData()[cardId] || []);
  var el = document.getElementById('chips-' + cardId);
  if (!el) return;
  if (list.length === 0) {
    el.innerHTML = '<span class="memo-chip-empty">없음</span>';
    return;
  }
  el.innerHTML = list.map(function(m) {
    var date = m.updated ? fmtShort(m.updated) : fmtShort(m.created);
    return '<div class="memo-chip"><span class="memo-chip-date">' + date + '</span><span class="memo-chip-name">' + escHtml(m.client || '') + '</span></div>';
  }).join('');
}

document.getElementById('btn-refund-process').addEventListener('click', function() {
  addMemo('refund-process');
});
document.getElementById('inp-refund-process').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') addMemo('refund-process');
});

function addMemo(cardId) {
  var inp = document.getElementById('inp-' + cardId);
  var client = inp.value.trim();
  if (!client) return;
  var d = loadData();
  if (!d[cardId]) d[cardId] = [];
  d[cardId].push({ created: new Date().toISOString(), client: client, memo: '' });
  saveData(d);
  inp.value = '';
  renderChips(cardId);
}

renderChips('refund-process');
</script>
</body>
</html>

<body>
<div class="page-wrap">
<div class="page-header no-print">
  <h1>📋 통합고용세액공제 계산기</h1>
  <p>상시근로자 현황을 입력하면 연도별 공제·추징액을 자동 계산합니다.</p>
</div>
<div class="employ-modal">

    <div class="employ-modal-header">
      <div><div class="employ-modal-title">&#128100; 통합고용세액공제 계산기</div><div class="employ-modal-sub">조특법 §29의8 | 기본공제 + 추가공제 + 추징 (참고용)</div></div>
      
    </div>
    <div class="employ-modal-body">
      <div class="ec-settings">
        <div class="ec-card"><div class="ec-card-title">기본 설정</div><div class="ec-field"><label>기업구분</label><select id="ec-corp" onchange="ecRecalc()"><option value="sme">중소기업</option><option value="mid">중견기업</option><option value="big">대기업</option></select></div><div class="ec-field" id="ec-region-wrap"><label>사업장 소재지</label><select id="ec-region" onchange="ecRecalc()"><option value="metro">수도권 내</option><option value="local">수도권 밖</option></select></div><div class="ec-field"><label>최초 공제 귀속연도</label><select id="ec-base-year" onchange="ecBuildYears()"><option value="2023">2023년</option><option value="2024">2024년</option><option value="2025" selected>2025년</option></select></div></div>
        <div class="ec-card"><div class="ec-card-title">1인당 공제액</div><div class="ec-info-row"><span class="ec-info-label">청년등 기본공제</span><span class="ec-info-val" id="ec-info-youth">-</span></div><div class="ec-info-row"><span class="ec-info-label">청년외 기본공제</span><span class="ec-info-val" id="ec-info-general">-</span></div><div class="ec-info-row"><span class="ec-info-label">정규직 전환 (추가)</span><span class="ec-info-val" id="ec-info-convert">-</span></div><div class="ec-info-row"><span class="ec-info-label">육아휴직 복귀 (추가)</span><span class="ec-info-val" id="ec-info-parental">-</span></div><div class="ec-note">청년등 = 청년(15~34세)·장애인·60세이상·경력단절여성</div></div>
      </div>
      <div style="font-size:12px;font-weight:900;color:#334155;margin-bottom:10px;">연도별 상시근로자 입력</div>
      <div class="ec-year-grid" id="ec-years-container"></div>
      <div class="ec-summary"><div class="ec-card-title">연도별 공제·추징 요약</div><div id="ec-summary-wrap"></div><div id="ec-total-box" style="margin-top:10px;"></div></div>
    </div>
    <div class="employ-modal-footer">
      
      <button class="modal-print-btn" onclick="printEmployModal()" title="이 계산 결과 PDF/인쇄">&#128424;&#65039;</button>
      <button class="modal-apply" style="background:#10B981;" onclick="printEmployModal()" style="background:#4361ee;color:#fff;padding:6px 14px;border:none;border-radius:8px;cursor:pointer;font-size:12px;font-weight:700;">🖨️ 출력</button>
    </div>
  </div>

</div>

<script>

var sgaCnt=0;
var BRACKETS=[{limit:14000000,rate:0.06,deduc:0},{limit:50000000,rate:0.15,deduc:1260000},{limit:88000000,rate:0.24,deduc:5760000},{limit:150000000,rate:0.35,deduc:15440000},{limit:300000000,rate:0.38,deduc:19940000},{limit:500000000,rate:0.40,deduc:25940000},{limit:1000000000,rate:0.42,deduc:35940000},{limit:Infinity,rate:0.45,deduc:65940000}];
var currentModalType=null;
function fmt(n){return Math.round(n).toLocaleString('ko-KR');}
var EC_RATES={sme:{metro:{youth:14500000,general:8500000},local:{youth:15500000,general:9500000},convert:13000000,parental:13000000},mid:{metro:{youth:8000000,general:4500000},local:{youth:8000000,general:4500000},convert:9000000,parental:9000000},big:{metro:{youth:4000000,general:0},local:{youth:4000000,general:0},convert:0,parental:0}};
var EC_MAX={sme:3,mid:3,big:2};var ecLastResult=[];
function openEmployModal(){ecBuildYears();}
function closeEmployModal(){}
document.getElementById('employ-overlay').addEventListener('click',function(e){if(e.target===this)closeEmployModal();});
function ecVal(id){var el=document.getElementById(id);return el?el.value:'';}
function ecNum(id){var el=document.getElementById(id);if(!el)return 0;return parseFloat((el.value||'').replace(/,/g,''))||0;}
function ecSetText(id,t){var el=document.getElementById(id);if(el)el.textContent=t;}
function ecSetHtml(id,h){var el=document.getElementById(id);if(el)el.innerHTML=h;}
function ecGetRates(){var c=ecVal('ec-corp'),r=ecVal('ec-region'),rv=EC_RATES[c][r];return{youth:rv.youth,general:rv.general,convert:EC_RATES[c].convert,parental:EC_RATES[c].parental};}
function ecUpdateInfo(){var r=ecGetRates();function lbl(v){return v?fmt(v/10000)+'만원':'해당없음';}ecSetText('ec-info-youth',lbl(r.youth));ecSetText('ec-info-general',lbl(r.general));ecSetText('ec-info-convert',lbl(r.convert));ecSetText('ec-info-parental',lbl(r.parental));document.getElementById('ec-region-wrap').style.display=ecVal('ec-corp')==='sme'?'':'none';}
function ecBuildYears(){var baseYear=parseInt(ecVal('ec-base-year')),c=ecVal('ec-corp'),maxY=EC_MAX[c],grid=document.getElementById('ec-years-container');grid.innerHTML='';for(var offset=0;offset<=maxY;offset++){var yr=baseYear-1+offset,isBase=(offset===0),card=document.createElement('div');card.className='ec-year-card';var badge=isBase?'<span class="ec-badge ec-badge-gray">기준(전년)</span>':'<span class="ec-badge">'+offset+'차 공제</span>';var h='<div class="ec-year-title">'+badge+'<span style="color:'+(isBase?'#64748b':'#6366F1')+';">'+yr+'년</span></div><table class="ec-wtable"><thead><tr><th>구분</th><th>인원수(명)</th><th>전년비</th></tr></thead><tbody><tr><td>청년등</td><td><input type="text" id="ec-youth-'+yr+'" placeholder="0" oninput="ecWorkerInput(this,'+yr+')" onfocus="this.select()"/></td><td><span id="ec-dy-'+yr+'" class="ec-auto">-</span></td></tr><tr><td>청년외</td><td><input type="text" id="ec-general-'+yr+'" placeholder="0" oninput="ecWorkerInput(this,'+yr+')" onfocus="this.select()"/></td><td><span id="ec-dg-'+yr+'" class="ec-auto">-</span></td></tr><tr><td>전체 합계</td><td class="auto-cell"><input type="text" id="ec-total-'+yr+'" class="auto-inp" readonly placeholder="자동"/></td><td><span id="ec-dt-'+yr+'" class="ec-auto">-</span></td></tr></tbody></table>';if(!isBase){h+='<div class="ec-extra"><div class="ec-extra-title">② 추가공제</div><div class="ec-extra-row"><span class="ec-extra-label">육아휴직 복귀</span><input type="text" class="ec-extra-input" id="ec-par-'+yr+'" placeholder="0" oninput="ecRecalc()" onfocus="this.select()"/><span style="font-size:9px;color:#94a3b8;">명</span></div></div><div class="ec-jing-section"><div class="ec-jing-title">추징 (해당시만)</div><div class="ec-extra-row"><span class="ec-extra-label">육아휴직 2년내 퇴사</span><input type="text" class="ec-extra-input" id="ec-xpar-'+yr+'" placeholder="0" oninput="ecRecalc()" onfocus="this.select()"/><span style="font-size:9px;color:#94a3b8;">명</span></div></div>';}card.innerHTML=h;grid.appendChild(card);}ecRecalc();}
function ecWorkerInput(el,yr){el.value=el.value.replace(/[^0-9.]/g,'');ecUpdateTotals();ecUpdateDiffs();ecRecalc();}
function ecGetW(yr){var y=ecNum('ec-youth-'+yr),g=ecNum('ec-general-'+yr);return{youth:y,general:g,total:Math.round((y+g)*100)/100};}
function ecUpdateTotals(){var baseYear=parseInt(ecVal('ec-base-year')),c=ecVal('ec-corp'),maxY=EC_MAX[c];for(var offset=0;offset<=maxY;offset++){var yr=baseYear-1+offset,w=ecGetW(yr),el=document.getElementById('ec-total-'+yr);if(el)el.value=(w.youth||w.general)?w.total.toFixed(2):'';}}
function ecUpdateDiffs(){var baseYear=parseInt(ecVal('ec-base-year')),c=ecVal('ec-corp'),maxY=EC_MAX[c];for(var offset=1;offset<=maxY;offset++){var yr=baseYear-1+offset,pYr=yr-1,cur=ecGetW(yr),prev=ecGetW(pYr);if(!document.getElementById('ec-youth-'+yr))continue;var dt=cur.total-prev.total,dy=cur.youth-prev.youth,dg=cur.general-prev.general;function setD(id,v){var el=document.getElementById(id);if(el){el.textContent=(v>=0?'+':'')+v.toFixed(2);el.className='ec-auto'+(v>0?' pos':v<0?' neg':'');}}setD('ec-dt-'+yr,dt);setD('ec-dy-'+yr,dy);setD('ec-dg-'+yr,dg);}}
function ecCalcYear(offset,baseYear,rates){
  var yr=baseYear-1+offset,pYr=yr-1;
  if(!document.getElementById('ec-youth-'+yr))return null;
  var cur=ecGetW(yr),prev=ecGetW(pYr),bW=ecGetW(baseYear),bWp=ecGetW(baseYear-1);
  // ì ë ëë¹ ì¦ê° (ê³µì  ê³ì°ì©)
  var dT=cur.total-prev.total,dY=cur.youth-prev.youth,dG=cur.general-prev.general;
  var tInc=Math.max(0,dT),yInc=Math.min(Math.max(0,dY),tInc),gInc=Math.min(Math.max(0,dG),tInc-yInc);
  var dY2=yInc*rates.youth,dG2=gInc*rates.general;
  var par=ecNum('ec-par-'+yr)||0;
  var dPar=par*rates.parental,dTotal=dY2+dG2+dPar;
  var xPar=ecNum('ec-xpar-'+yr)||0;
  var jPar=xPar*rates.parental,jEmp=0;
    if(offset>=2){
    var decT_bW=Math.max(0,bW.total-cur.total);
    var decY_bW=Math.max(0,bW.youth-cur.youth);
    var decG_bW=Math.max(0,bW.general-cur.general);
    var b0Y=Math.max(0,bW.youth-bWp.youth);
    var minYInc=b0Y;
    if(offset===3){var dY2inner=Math.max(0,prev.youth-bW.youth);minYInc=Math.min(minYInc,dY2inner);}
    var timesA=offset-1;
    var jEmpA=0,jEmpB=0;
    if(decT_bW>0){
      jEmpA=Math.min(minYInc,decT_bW)*rates.youth*timesA+Math.min(decT_bW,decG_bW)*rates.general*timesA;
    }else if(decY_bW>0){
      jEmpA=Math.min(b0Y,decY_bW)*(rates.youth-rates.general)*timesA;
    }
    if(offset===3){
      var decT_prev2=Math.max(0,prev.total-cur.total);
      var b0G_prev=Math.max(0,prev.general-bW.general);
      if(decT_prev2>0&&dY2inner>0){
        jEmpB=Math.min(dY2inner,decT_prev2)*rates.youth+Math.min(decT_prev2,b0G_prev)*rates.general;
      }else if(Math.max(0,prev.youth-cur.youth)>0&&dY2inner>0){
        jEmpB=Math.min(dY2inner,Math.max(0,prev.youth-cur.youth))*(rates.youth-rates.general);
      }
    }
    jEmp=jEmpA+jEmpB;
    }
    var jTotal=jPar+jEmp;
  return{yr,offset,dT,dY,dG,tInc,yInc,gInc,dY2,dG2,dPar,dTotal,par,xPar,jPar,jEmp,jTotal};
}
function ecCalcJing(b0Y,b0G,decT,decY,decG,rates){var ry=rates.youth,rg=rates.general;if(decT>0){if(decY>0&&decG<=0){return Math.min(b0Y,decY)*(ry-rg)+decT*rg;}else if(decY>0&&decG>0){var partY=Math.min(b0Y,decT,decY)*ry;var effectiveG=decY>b0Y?decG+(decY-b0Y):decG;return partY+Math.min(effectiveG,decT)*rg;}else{return Math.min(decG,decT)*rg;}}else if(decY>0){return Math.min(b0Y,decY)*(ry-rg);}return 0;}
function ecRecalc(){ecUpdateInfo();ecUpdateTotals();ecUpdateDiffs();var baseYear=parseInt(ecVal('ec-base-year')),c=ecVal('ec-corp'),maxY=EC_MAX[c],rates=ecGetRates(),results=[];for(var offset=1;offset<=maxY;offset++){var r=ecCalcYear(offset,baseYear,rates);if(r)results.push(r);}ecRenderSummary(results);ecLastResult=results;}
function ecRenderSummary(results){if(!results.length){ecSetHtml('ec-summary-wrap','');ecSetHtml('ec-total-box','');return;}var tY=0,tG=0,tP=0,tJ=0,rows=results.map(function(r){tY+=r.dY2;tG+=r.dG2;tP+=r.dPar;tJ+=r.jTotal;var tag=r.jTotal>0?'<span class="ec-tag ec-tag-red">추징</span>':(r.dTotal>0?'<span class="ec-tag ec-tag-green">공제</span>':'<span class="ec-tag ec-tag-gray">-</span>');return'<tr><td>'+r.yr+'년 ('+r.offset+'차)</td><td>'+(r.dT>=0?'<span style="color:#10B981">+':'<span style="color:#ef4444">')+r.dT.toFixed(2)+'명</span></td><td>'+(r.dY>=0?'<span style="color:#10B981">+':'<span style="color:#ef4444">')+r.dY.toFixed(2)+'</span>/'+(r.dG>=0?'<span style="color:#10B981">':'<span style="color:#ef4444">')+r.dG.toFixed(2)+'</span>'+'</td><td>'+(r.dY2>0?fmt(r.dY2):'-')+'</td><td>'+(r.dG2>0?fmt(r.dG2):'-')+'</td><td>'+(r.dPar>0?fmt(r.dPar):'-')+'</td><td>'+(r.jTotal>0?'<span style="color:#ef4444">'+fmt(r.jTotal)+'</span>':'-')+'</td><td>'+tag+'</td></tr>';});var tD=tY+tG+tP;ecSetHtml('ec-summary-wrap','<table class="ec-sum-table"><thead><tr><th>귀속연도</th><th>전체증감</th><th>청년등/청년외</th><th>청년공제</th><th>청년외공제</th><th>추가공제</th><th>추징액</th><th>상태</th></tr></thead><tbody>'+rows.join('')+'<tr class="ec-total"><td>합 계</td><td></td><td></td><td>'+fmt(tY)+'</td><td>'+fmt(tG)+'</td><td>'+(tP>0?fmt(tP):'-')+'</td><td>'+(tJ>0?fmt(tJ):'-')+'</td><td></td></tr></tbody></table>');ecSetHtml('ec-total-box','<div class="ec-highlight"><span style="font-size:11px;font-weight:700;color:#6366F1;">공제 합계</span><span style="font-size:16px;font-weight:900;color:#6366F1;">'+fmt(tD)+'원</span>'+(tJ>0?'<span style="font-size:11px;font-weight:700;color:#ef4444;margin-left:12px;">추징 합계</span><span style="font-size:16px;font-weight:900;color:#ef4444;">'+fmt(tJ)+'원</span>':'')+'</div>');}
function applyEmploy(){printEmployModal();}
window.addEventListener('DOMContentLoaded',function(){openEmployModal();});
</script>
</body>
</html>
